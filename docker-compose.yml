services:
  db:
    image: postgres:16-alpine
    container_name: bookhaven-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookhaven}
      POSTGRES_USER: ${POSTGRES_USER:-bookhaven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookhaven}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bookhaven-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookhaven} -d ${POSTGRES_DB:-bookhaven}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookhaven-db-data:

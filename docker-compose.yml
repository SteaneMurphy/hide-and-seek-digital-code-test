services:
  db:
    image: postgres:16-alpine
    container_name: bookhaven-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookhaven}
      POSTGRES_USER: ${POSTGRES_USER:-bookhaven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookhaven}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bookhaven-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookhaven} -d ${POSTGRES_DB:-bookhaven}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-slim
    container_name: bookhaven-app
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookhaven}:${POSTGRES_PASSWORD:-bookhaven}@db:5432/${POSTGRES_DB:-bookhaven}
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  seed:
    image: node:20-alpine
    container_name: bookhaven-seed
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookhaven}:${POSTGRES_PASSWORD:-bookhaven}@db:5432/${POSTGRES_DB:-bookhaven}
    command: npx tsx db/seed.ts
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  bookhaven-db-data:
